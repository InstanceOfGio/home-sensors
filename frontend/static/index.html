<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Sensors</title>
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/date-fns@3/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
<div class="viz-root">
  <header>
    <h1>🏠 Home Sensors</h1>
    <span id="conn-status" class="badge">connecting…</span>
  </header>

  <section id="cards" class="cards"></section>

  <section class="chart-section">
    <div class="chart-header">
      <h2>Temperature</h2>
      <div class="range-buttons" id="range-buttons">
        <button data-range="24h" class="active">24h</button>
        <button data-range="7d">7 days</button>
        <button data-range="30d">30 days</button>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="temp-chart"></canvas></div>
  </section>

  <section class="chart-section">
    <h2>Humidity</h2>
    <div class="chart-wrap"><canvas id="humidity-chart"></canvas></div>
  </section>
</div>

<script src="/app.js"></script>
</body>
</html>
