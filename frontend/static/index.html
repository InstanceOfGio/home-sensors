<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Sensors</title>
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300..600,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/date-fns@3/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
<div class="viz-root" style="max-width:1100px;margin:0 auto;padding:24px 16px 64px;">

  <header style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
    <span style="font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.6rem;color:var(--primary);">🏠 Home Sensors</span>
    <span id="conn-status" class="badge">connecting…</span>
  </header>

  <section style="margin-bottom:28px;">
    <h1 id="greeting" style="font-family:'Quicksand',sans-serif;font-weight:700;font-size:1.6rem;color:var(--on-surface);margin:0 0 4px;"></h1>
    <p id="current-datetime" style="color:var(--on-surface-variant);margin:0;"></p>
  </section>

  <section id="cards" style="display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:20px;margin-bottom:32px;"></section>

  <section id="weather-section" style="display:none;margin-bottom:28px;">
    <div class="surface-card soft-cloud-shadow" style="background:var(--surface-container);">
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:16px;">
        <img src="/img/garden.png" alt="" style="width:96px;height:96px;object-fit:contain;flex-shrink:0;">
        <div>
          <span class="badge" style="background:var(--secondary-container);color:var(--on-secondary-container);">Outdoor forecast</span>
          <h2 style="font-family:'Quicksand',sans-serif;font-weight:600;font-size:1.3rem;margin:6px 0 0;color:var(--on-surface);">Hourly Forecast</h2>
        </div>
      </div>
      <div id="weather-hourly" class="scrollbar-hide" style="display:flex;gap:20px;overflow-x:auto;padding-bottom:4px;"></div>
    </div>
  </section>

  <section class="surface-card surface-card--compact soft-cloud-shadow" style="margin-bottom:20px;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
      <h2 style="font-family:'Quicksand',sans-serif;font-weight:600;font-size:1.15rem;margin:0;color:var(--on-surface);">Temperature</h2>
      <div class="range-buttons" id="range-buttons">
        <button data-range="24h" class="active">24h</button>
        <button data-range="7d">7 days</button>
        <button data-range="30d">30 days</button>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="temp-chart"></canvas></div>
  </section>

  <section class="surface-card surface-card--compact soft-cloud-shadow">
    <h2 style="font-family:'Quicksand',sans-serif;font-weight:600;font-size:1.15rem;margin:0 0 12px;color:var(--on-surface);">Humidity</h2>
    <div class="chart-wrap"><canvas id="humidity-chart"></canvas></div>
  </section>

</div>

<script src="/app.js"></script>
</body>
</html>
