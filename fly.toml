# fly.toml app configuration file generated for home-sensors on 2026-07-19T16:11:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'home-sensors'
primary_region = 'ams'

[build]

[env]
  DB_PATH = '/data/sensors.db'
  PORT = '8080'

[[mounts]]
  source = 'sensors_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
