app = "home-sensors"
primary_region = "fra"

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/sensors.db"

[[mounts]]
  source = "sensors_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
